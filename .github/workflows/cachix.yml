name: Build and Cache Specific Nix Packages

on:
  workflow_dispatch:

jobs:
  prepare-matrix:
    name: Check Cache
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = pipe-operators

      - name: Filter packages against Cachix (parallel)
        id: set-matrix
        run: |
          PACKAGES=(
            "hyprland"
            "yazi"
            "cliphist"
            "cliphist-tui"
            "amdgpu_top"
            "loupe"
            "lan-mouse"
            "lla"
            "quickshell"
            "otter-launcher"
            "fsel"
          )

          mkdir -p /tmp/missing
          pids=()

          for pkg in "${PACKAGES[@]}"; do
            (
              if STORE_PATH=$(nix eval --raw ".#packages.x86_64-linux.$pkg.outPath"); then
                if ! nix path-info --store https://onelock.cachix.org "$STORE_PATH" >/dev/null 2>&1; then
                  touch "/tmp/missing/$pkg"
                fi
              else
                echo "::error::Evaluation failed for package: $pkg"
                exit 1
              fi
            ) &
            pids+=($!)
          done

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done

          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more package evaluations failed"
            exit 1
          fi

          MISSING=()
          for pkg in "${PACKAGES[@]}"; do
            if [ -f "/tmp/missing/$pkg" ]; then
              MISSING+=("$pkg")
            fi
          done

          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "All packages are cached."
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            JSON_ARRAY="$(printf '%s\n' "${MISSING[@]}" | jq -R . | jq -s -c .)"
            echo "matrix=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
          fi

  build-heavy-packages:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.matrix != '[]' }}
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = pipe-operators

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: onelock
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Build and Push ${{ matrix.package }}
        run: |
          echo "Starting build for ${{ matrix.package }}..."
          nix build ".#packages.x86_64-linux.${{ matrix.package }}" \
            --print-out-paths --print-build-logs \
            | cachix push onelock
